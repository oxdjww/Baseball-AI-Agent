<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>회원 관리 · Baseball AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body th:replace="~{fragments/layout :: layout(~{::section}, true)}">
<section>

    <!-- 헤더 행 -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold mb-0" style="color:var(--indigo)">회원 관리</h2>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#noticeModal">
                📢 공지 발송
            </button>
            <a th:href="@{/admin/members/new}" class="btn btn-primary btn-sm">+ 회원 추가</a>
        </div>
    </div>

    <!-- 통계 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold" style="color:var(--indigo)" th:text="${totalCount}">0</div>
                <div class="help-text">총 회원</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold text-success" th:text="${linkedCount}">0</div>
                <div class="help-text">텔레그램 연결</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold text-secondary" th:text="${unlinkedCount}">0</div>
                <div class="help-text">미연결</div>
            </div>
        </div>
    </div>

    <!-- 검색 -->
    <div class="mb-3">
        <input type="text" id="searchInput" class="form-control" placeholder="이름 또는 응원팀으로 검색…" oninput="filterTable()"/>
    </div>

    <!-- 회원 테이블 -->
    <div class="card card-brand">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0" id="memberTable">
                    <thead>
                    <tr>
                        <th class="ps-3">ID</th>
                        <th>이름</th>
                        <th>응원팀</th>
                        <th>텔레그램</th>
                        <th class="text-center">AI분석</th>
                        <th class="text-center">우천</th>
                        <th class="text-center">실시간</th>
                        <th class="pe-3">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="m : ${members}">
                        <td class="ps-3 text-muted small" th:text="${m.id}"></td>
                        <td class="fw-semibold" th:text="${m.name}"></td>
                        <td>
                            <span class="badge text-bg-light border fw-normal" th:text="${m.supportTeam.displayName}"></span>
                        </td>
                        <td>
                            <span th:if="${m.telegramId != null}"
                                  class="badge text-bg-success fw-normal"
                                  th:text="${m.telegramId}"></span>
                            <span th:if="${m.telegramId == null}"
                                  class="badge text-bg-secondary fw-normal">미연결</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${m.notifyGameAnalysis}" class="badge text-bg-primary">✓</span>
                            <span th:unless="${m.notifyGameAnalysis}" class="text-muted small">—</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${m.notifyRainAlert}" class="badge text-bg-primary">✓</span>
                            <span th:unless="${m.notifyRainAlert}" class="text-muted small">—</span>
                        </td>
                        <td class="text-center">
                            <span th:if="${m.notifyRealTimeAlert}" class="badge text-bg-primary">✓</span>
                            <span th:unless="${m.notifyRealTimeAlert}" class="text-muted small">—</span>
                        </td>
                        <td class="pe-3">
                            <div class="d-flex gap-2">
                                <a th:href="@{'/admin/members/' + ${m.id} + '/edit'}"
                                   class="btn btn-sm btn-outline-primary">수정</a>
                                <form th:action="@{'/admin/members/' + ${m.id} + '/delete'}" method="post"
                                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">삭제</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(members)}">
                        <td colspan="8" class="text-center text-muted py-4">등록된 회원이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 공지 발송 모달 -->
    <div class="modal fade" id="noticeModal" tabindex="-1" aria-labelledby="noticeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="noticeModalLabel" style="color:var(--indigo)">📢 전체 공지 발송</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">메시지 내용</label>
                    <textarea id="noticeMessage" class="form-control" rows="4"
                              placeholder="텔레그램으로 전송될 공지 내용을 입력하세요."></textarea>
                    <div id="noticeResult" class="mt-2 small"></div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-outline-primary btn-sm" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="sendNotice()">발송</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function filterTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#memberTable tbody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(keyword) ? '' : 'none';
            });
        }

        function sendNotice() {
            const message = document.getElementById('noticeMessage').value.trim();
            const resultEl = document.getElementById('noticeResult');
            if (!message) {
                resultEl.innerHTML = '<span class="text-danger">메시지를 입력하세요.</span>';
                return;
            }
            fetch('/admin/telegram/notice/all', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message})
            })
            .then(res => res.ok
                ? resultEl.innerHTML = '<span class="text-success">✓ 발송 완료</span>'
                : resultEl.innerHTML = '<span class="text-danger">발송 실패 (서버 오류)</span>'
            )
            .catch(() => resultEl.innerHTML = '<span class="text-danger">발송 실패 (네트워크 오류)</span>');
        }
    </script>

</section>
</body>
</html>
