<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${member.id == null ? '회원 등록' : '회원 수정'} + ' · Baseball AI Agent'">회원 등록 · Baseball AI Agent</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body th:replace="~{fragments/layout :: layout(~{::section}, true)}">
<section>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold mb-0" style="color:var(--indigo)"
            th:text="${member.id == null ? '회원 등록' : '회원 수정'}">회원 등록</h2>
        <a th:href="@{/admin/members}" class="btn btn-outline-primary btn-sm">← 목록</a>
    </div>

    <div class="card card-brand">
        <div class="card-body">
            <form th:action="${formAction}" method="post" th:object="${member}" class="row g-3">

                <!-- 이름 -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">이름</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="홍길동" required/>
                </div>

                <!-- 응원 팀 -->
                <div class="col-12">
                    <label class="form-label fw-semibold d-block">응원 팀</label>
                    <div class="d-flex flex-wrap gap-2 mt-1">
                        <th:block th:each="team : ${teams}">
                            <input type="radio" class="btn-check" th:id="${'team-' + team.name()}"
                                   th:field="*{supportTeam}" th:value="${team.name()}" autocomplete="off"/>
                            <label class="team-chip" th:for="${'team-' + team.name()}"
                                   th:text="${team.displayName}"></label>
                        </th:block>
                    </div>
                </div>

                <!-- 텔레그램 ID -->
                <div class="col-12 col-md-6">
                    <label class="form-label fw-semibold">텔레그램 ID</label>
                    <input type="text" th:field="*{telegramId}" class="form-control"
                           placeholder="예: 123456789"/>
                    <div class="form-text">봇 연결 후 자동으로 설정됩니다.</div>
                </div>

                <!-- 알림 설정 -->
                <div class="col-12">
                    <label class="form-label fw-semibold d-block mb-2">알림 설정</label>
                    <div class="row g-2">
                        <div class="col-12 col-md-4">
                            <div class="form-check p-3 border rounded" style="background:#f8f9ff">
                                <input class="form-check-input" type="checkbox" th:field="*{notifyGameAnalysis}" id="opt1"/>
                                <label class="form-check-label" for="opt1">⚾ 경기 분석 알림</label>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="form-check p-3 border rounded" style="background:#f8f9ff">
                                <input class="form-check-input" type="checkbox" th:field="*{notifyRainAlert}" id="opt2"/>
                                <label class="form-check-label" for="opt2">🌧 우천 취소 알림</label>
                            </div>
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="form-check p-3 border rounded" style="background:#f8f9ff">
                                <input class="form-check-input" type="checkbox" th:field="*{notifyRealTimeAlert}" id="opt3"/>
                                <label class="form-check-label" for="opt3">🔔 실시간 역전 알림</label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 버튼 -->
                <div class="col-12 d-flex flex-wrap gap-2 mt-2 border-top pt-3">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <a th:href="@{/admin/members}" class="btn btn-outline-primary">취소</a>
                </div>
            </form>
        </div>
    </div>

</section>
</body>
</html>
