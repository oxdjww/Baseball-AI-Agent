<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <title>홈 · Kbaseball</title>
    <th:block th:replace="~{fragments/layout :: head}"></th:block>
</head>
<body th:replace="~{fragments/layout :: layout(~{::section}, false)}">
<section>
    <div class="card card-brand">
        <div class="card-body p-4">

            <!-- 탭 헤더: 서버 사이드로 active 처리 -->
            <ul class="nav nav-pills mb-3" id="homeTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            id="signup-tab"
                            data-bs-toggle="pill"
                            data-bs-target="#signup-pane"
                            type="button" role="tab"
                            th:classappend="${activeTab}=='login' ? '' : ' active'"
                            th:attr="aria-selected=${activeTab}=='login' ? 'false' : 'true'">
                        회원가입
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link"
                            id="login-tab"
                            data-bs-toggle="pill"
                            data-bs-target="#login-pane"
                            type="button" role="tab"
                            th:classappend="${activeTab}=='login' ? ' active' : ''"
                            th:attr="aria-selected=${activeTab}=='login' ? 'true' : 'false'">
                        로그인
                    </button>
                </li>
            </ul>

            <div class="tab-content">
                <!-- 회원가입 -->
                <div class="tab-pane fade"
                     id="signup-pane"
                     role="tabpanel" aria-labelledby="signup-tab"
                     th:classappend="${activeTab}=='login' ? '' : ' show active'">
                    <form th:action="@{/home/signup}" method="post" th:object="${signup}">
                        <div class="row g-3">
                            <div class="col-12 col-md-6">
                                <label class="form-label">성함</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="홍길동" required/>
                            </div>

                            <div class="col-12">
                                <label class="form-label d-block">응원팀</label>
                                <div class="d-flex flex-wrap gap-2 mt-1">
                                    <th:block th:each="team : ${teams}">
                                        <input type="radio" class="btn-check" th:id="${'s-team-' + team.name()}"
                                               th:field="*{supportTeam}" th:value="${team.name()}" autocomplete="off"
                                               required/>
                                        <label class="team-chip" th:for="${'s-team-' + team.name()}"
                                               th:text="${team.displayName}"></label>
                                    </th:block>
                                </div>
                            </div>

                            <!-- 알림 수신 여부 -->
                            <div class="col-12">
                                <div class="row g-3">
                                    <div class="col-12 col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   th:field="*{notifyRainAlert}" id="s-opt2"/>
                                            <label class="form-check-label" for="s-opt2">우천 취소 알림 ☔</label>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   th:field="*{notifyRealTimeAlert}" id="s-opt3"/>
                                            <label class="form-check-label" for="s-opt3">실시간 역전/동점 알림 🚀</label>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox"
                                                   th:field="*{notifyGameAnalysis}" id="s-opt1"/>
                                            <label class="form-check-label" for="s-opt1">AI 경기 분석 레포트 🧠</label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 d-flex gap-2">
                                <button type="submit" class="btn btn-primary">가입하기</button>
                            </div>
                        </div>
                        <!-- honeypot: 봇 탐지용 숨김 필드 (사람 눈에 보이지 않음) -->
                        <input type="text" name="website" id="website"
                               style="display:none !important; visibility:hidden; position:absolute; left:-9999px;"
                               autocomplete="off" tabindex="-1" aria-hidden="true"/>
                    </form>
                </div>

                <!-- 로그인 -->
                <div class="tab-pane fade"
                     id="login-pane"
                     role="tabpanel" aria-labelledby="login-tab"
                     th:classappend="${activeTab}=='login' ? ' show active' : ''">

                    <!-- ✅ 로그인 성공 상태 (모바일 최적화) -->
<div th:if="${member != null}" class="alert alert-success login-status mb-3">
  <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-2">
    <div class="d-flex align-items-center gap-2 flex-wrap">
      <span class="badge bg-success">로그인됨</span>
      <div class="who fw-semibold">
        <span th:text="${member.name}">홍길동</span>
        <span class="text-muted">님 ·</span>
        <span class="badge text-bg-light"
              th:text="${member.supportTeam.displayName}">한화</span>
      </div>
    </div>

    <!-- actions: 모바일은 세로(풀폭), md↑는 가로 정렬 -->
    <div class="actions d-grid gap-2 w-100 w-md-auto ms-md-auto">
      <a class="btn btn-outline-secondary btn-sm" th:href="@{/home/preferences}">
        응원팀/알림 설정
      </a>
      <form th:action="@{/home/logout}" method="post" class="m-0">
        <button type="submit" class="btn btn-outline-danger btn-sm w-100 w-md-auto">로그아웃</button>
      </form>
    </div>
  </div>
</div>

<style>
/* 모바일 가독성 향상 */
.login-status .who { line-height: 1.2; white-space: nowrap; }
/* 버튼 전체폭(모바일) */
@media (max-width: 576px) {
  .login-status .actions { grid-template-columns: 1fr; }
}
/* 가로 정렬(md+) */
@media (min-width: 768px) {
  .login-status .actions { display: flex !important; gap: .5rem; }
}
</style>

                    <!-- 로그인 폼 (로그인 전) -->
                    <div th:if="${member == null}">
                        <!-- 실패 시 폼 상단 경고 -->
                        <div class="alert alert-danger mb-3" th:if="${loginError}" th:text="${loginError}"></div>

                        <form th:action="@{/home/login}" method="post" th:object="${login}">
                            <div class="row g-3">
                                <div class="col-12 col-md-6">
                                    <label class="form-label">이름</label>
                                    <input type="text" th:field="*{name}" class="form-control" placeholder="홍길동"
                                           required/>
                                </div>

                                <div class="col-12">
                                    <label class="form-label d-block">응원 팀</label>
                                    <div class="d-flex flex-wrap gap-2 mt-1">
                                        <th:block th:each="team : ${teams}">
                                            <input type="radio" class="btn-check" th:id="${'l-team-' + team.name()}"
                                                   th:field="*{supportTeam}" th:value="${team.name()}"
                                                   autocomplete="off" required/>
                                            <label class="team-chip" th:for="${'l-team-' + team.name()}"
                                                   th:text="${team.displayName}"></label>
                                        </th:block>
                                    </div>
                                </div>

                                <div class="col-12 d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">로그인</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- 🔔 로그인 실패 토스트 (팝업) -->
            <div class="position-fixed bottom-0 end-0 p-3" style="z-index:1100;" th:if="${loginError}">
                <div id="loginErrorToast" class="toast text-bg-danger" role="alert" aria-live="assertive"
                     aria-atomic="true">
                    <div class="toast-header">
                        <strong class="me-auto">로그인 실패</strong>
                        <small>지금</small>
                        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                    <div class="toast-body" th:text="${loginError}">일치하는 회원을 찾을 수 없습니다.</div>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- 토스트만 표시 (탭 전환 JS 없음) -->
<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function () {
        var hasError = /*[[${loginError} != null]]*/ false;
        if (hasError) {
            var toastEl = document.getElementById('loginErrorToast');
            if (toastEl) {
                var toast = new bootstrap.Toast(toastEl, {delay: 3500});
                toast.show();
            }
        }
    });
</script>
</body>
</html>
