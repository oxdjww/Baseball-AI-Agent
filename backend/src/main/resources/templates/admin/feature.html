<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>기능 토글 · Kbaseball</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body th:replace="~{fragments/layout :: layout(~{::section}, true)}">
<section>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 fw-bold mb-0" style="color:var(--indigo)">기능 토글 관리</h2>
        <a th:href="@{/admin/members}" class="btn btn-outline-primary btn-sm">← 회원 관리</a>
    </div>

    <!-- 요약 카드 -->
    <div class="row g-3 mb-4">
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold" style="color:var(--indigo)"
                     th:text="${settings.size()}">0</div>
                <div class="help-text">전체 기능</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold text-success"
                     th:text="${#lists.size(settings.?[enabled == true])}">0</div>
                <div class="help-text">활성화</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-brand text-center py-3">
                <div class="fs-2 fw-bold text-secondary"
                     th:text="${#lists.size(settings.?[enabled == false])}">0</div>
                <div class="help-text">비활성화</div>
            </div>
        </div>
    </div>

    <!-- 기능 토글 테이블 -->
    <div class="card card-brand">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                    <tr>
                        <th class="ps-3">기능 키</th>
                        <th>설명</th>
                        <th class="text-center">상태</th>
                        <th class="pe-3">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${settings}">
                        <td class="ps-3 fw-semibold" th:text="${s.featureKey}"></td>
                        <td class="text-muted small"
                            th:text="${s.featureKey == 'AI_ANALYSIS' ? '경기 종료 후 AI 분석 알림 전송' :
                                       s.featureKey == 'REVERSAL_DETECTION' ? '실시간 역전 알림 전송' :
                                       s.featureKey == 'RAIN_ALERT' ? '우천 취소 사전 알림 전송' :
                                       '알 수 없는 기능'}">
                        </td>
                        <td class="text-center">
                            <span th:if="${s.enabled}"
                                  class="badge text-bg-success">활성화</span>
                            <span th:unless="${s.enabled}"
                                  class="badge text-bg-secondary">비활성화</span>
                        </td>
                        <td class="pe-3">
                            <form th:action="@{'/admin/features/' + ${s.featureKey} + '/toggle'}"
                                  method="post">
                                <button type="submit"
                                        th:class="${s.enabled} ? 'btn btn-sm btn-outline-danger' : 'btn btn-sm btn-outline-success'"
                                        th:text="${s.enabled} ? '비활성화' : '활성화'"
                                        th:onclick="${s.enabled} ? 'return confirm(\'기능을 비활성화하시겠습니까?\')' : 'return confirm(\'기능을 활성화하시겠습니까?\')'">
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(settings)}">
                        <td colspan="4" class="text-center text-muted py-4">등록된 기능 설정이 없습니다.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
